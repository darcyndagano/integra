services:
  - type: web
    name: ebms-mock
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: EBMS_USERNAME
        value: test_user
      - key: EBMS_PASSWORD
        value: test_pass
